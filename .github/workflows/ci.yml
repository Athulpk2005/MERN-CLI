name: CI — Lint, Build, Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm install --prefix templates/server

      - name: Install client dependencies
        run: npm ci --prefix templates/client

      - name: Client lint
        run: npm --prefix templates/client run lint

      - name: Client build
        run: npm --prefix templates/client run build

      - name: Run server smoke test
        run: npm --prefix templates/server run test:smoke

      - name: Run npm audit (root)
        run: npm audit --audit-level=moderate || true

      - name: Run npm audit (server)
        run: npm --prefix templates/server audit --audit-level=moderate || true

      - name: Run npm audit (client)
        run: npm --prefix templates/client audit --audit-level=moderate || true

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install templates/client dependencies
        run: npm ci --prefix templates/client

      - name: Install templates/client-ts dependencies
        run: npm ci --prefix templates/client-ts

      - name: Install templates/server dependencies
        run: npm ci --prefix templates/server

      - name: Lint client
        run: npm run lint --prefix templates/client

      - name: Build client
        run: npm run build --prefix templates/client

      - name: Build client-ts
        run: npm run build --prefix templates/client-ts

      - name: Audit client dependencies (moderate)
        run: npm audit --prefix templates/client --audit-level=moderate || true

      - name: Audit server dependencies (moderate)
        run: npm audit --prefix templates/server --audit-level=moderate || true

      - name: Show repo status
        run: git status --porcelain
