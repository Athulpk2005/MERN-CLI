name: Build and Publish Docker Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      SERVER_REPO: mern-app-server
      CLIENT_REPO: mern-app-client
      CLIENT_TS_REPO: mern-app-client-ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check AWS creds
        id: aws-creds
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && [ -n "${{ secrets.AWS_REGION }}" ]; then
            echo "aws_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "aws_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build and push server image (Docker Hub + GHCR)
        uses: docker/build-push-action@v4
        with:
          context: templates/server
          file: templates/server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mern-app-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mern-app-server:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/mern-app-server:latest
            ghcr.io/${{ github.repository_owner }}/mern-app-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish server image to ECR (if AWS creds present)
        if: ${{ steps.aws-creds.outputs.aws_present == 'true' }}
        uses: docker/build-push-action@v4
        with:
          context: templates/server
          file: templates/server/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.SERVER_REPO }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.SERVER_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image (Docker Hub + GHCR)
        uses: docker/build-push-action@v4
        with:
          context: templates/client
          file: templates/client/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mern-app-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mern-app-client:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/mern-app-client:latest
            ghcr.io/${{ github.repository_owner }}/mern-app-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish client image to ECR (if AWS creds present)
        if: ${{ steps.aws-creds.outputs.aws_present == 'true' }}
        uses: docker/build-push-action@v4
        with:
          context: templates/client
          file: templates/client/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.CLIENT_REPO }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.CLIENT_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client-ts image (Docker Hub + GHCR)
        uses: docker/build-push-action@v4
        with:
          context: templates/client-ts
          file: templates/client-ts/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mern-app-client-ts:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mern-app-client-ts:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/mern-app-client-ts:latest
            ghcr.io/${{ github.repository_owner }}/mern-app-client-ts:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish client-ts image to ECR (if AWS creds present)
        if: ${{ steps.aws-creds.outputs.aws_present == 'true' }}
        uses: docker/build-push-action@v4
        with:
          context: templates/client-ts
          file: templates/client-ts/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.CLIENT_TS_REPO }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.CLIENT_TS_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
